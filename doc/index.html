<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Public Offer & Draw Result — UVS</title>
<style>
:root{--ink:#16191d;--mut:#5b6470;--ln:#d7dce3;--accent:#1f6feb;--ok:#1a7f37;--bg:#f6f7f9}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 Georgia,"Times New Roman",serif}
.bar{background:#11151b;color:#e6edf3;padding:10px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-family:system-ui,sans-serif;font-size:13px}
.bar input{font-family:ui-monospace,monospace;font-size:13px;padding:4px 6px;border-radius:6px;border:1px solid #2a323d;background:#0c0f14;color:#e6edf3;min-width:160px}
.bar button{padding:6px 12px;border-radius:6px;border:0;background:var(--accent);color:#fff;font-weight:600;cursor:pointer}
.bar .sp{flex:1}
.page{max-width:820px;margin:18px auto;background:#fff;border:1px solid var(--ln);border-radius:6px;padding:42px 52px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
h1{font-size:23px;margin:0 0 2px}
.sub{color:var(--mut);font-size:13px;font-family:system-ui,sans-serif;margin:0 0 22px}
h2{font-size:15px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--ln);padding-bottom:5px;margin:26px 0 12px;font-family:system-ui,sans-serif}
.kv{display:flex;gap:10px;margin:5px 0}.kv b{min-width:160px;color:var(--mut);font-weight:400;font-family:system-ui,sans-serif;font-size:13px}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;word-break:break-all}
.org input{border:0;border-bottom:1px dotted #9aa3af;font:inherit;padding:1px 2px;min-width:230px;background:transparent}
.org .row{margin:4px 0}.org label{display:inline-block;min-width:150px;color:var(--mut);font-family:system-ui,sans-serif;font-size:13px}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:6px}
th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--ln)}
th{color:var(--mut);font-family:system-ui,sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
.win td{font-weight:bold}
.badge{display:inline-block;padding:1px 9px;border-radius:999px;background:rgba(26,127,55,.12);color:var(--ok);font-size:12px;font-weight:700;font-family:system-ui,sans-serif}
.note{color:var(--mut);font-size:12.5px;font-family:system-ui,sans-serif}
pre{background:#f1f3f6;border:1px solid var(--ln);border-radius:6px;padding:10px 12px;font-size:12px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
a{color:var(--accent)}
.foot{margin-top:30px;border-top:1px solid var(--ln);padding-top:12px;color:var(--mut);font-size:12px;font-family:system-ui,sans-serif}
details{margin-top:8px}summary{cursor:pointer;color:var(--accent);font-family:system-ui,sans-serif;font-size:13px}
@media print{ .bar{display:none} body{background:#fff} .page{margin:0;border:0;box-shadow:none;padding:0;max-width:none} .org input{border-bottom:1px solid #000} a{color:#000;text-decoration:none} pre{background:#fff} }
</style></head><body>
<div class="bar">
  <span>drawId</span><input id="idIn" placeholder="paste a drawId">
  <button onclick="load()">Load</button>
  <span class="sp"></span>
  <span class="note" style="color:#9aa3af">Fill your organisation details, then</span>
  <button onclick="window.print()">Print / Save as PDF</button>
</div>
<div class="page" id="page"><p class="note">Enter a drawId above and press Load.</p></div>
<script>
var $=function(id){return document.getElementById(id);};
var P=new URLSearchParams(location.search);
var BACKEND=P.get('backend')||'https://registrar.uncloned.work';
var SITE='https://uvs.uncloned.work';
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function iso(t){ return t? new Date(t*1000).toISOString().replace('T',' ').replace('.000Z',' UTC') : '—'; }
function isoMs(s){ return s? esc(String(s).replace('T',' ').replace(/\..+/,' UTC')) : '—'; }
function prizeText(p){ if(!Array.isArray(p)) return '—';
  return p.map(function(t){ if(t.count!=null) return esc(t.tier)+' × '+t.count;
    if(t.rule&&t.rule.num===1) return esc(t.tier)+' — 1 in '+t.rule.den;
    if(t.rule) return esc(t.tier)+' — '+t.rule.num+'%'; return esc(t.tier); }).join(' · '); }
function tsaLine(anchor){ if(!anchor||!anchor.tokens) return '—';
  return anchor.tokens.map(function(t){ return esc(t.tsa)+' @ '+iso(t.genTime); }).join('  ·  '); }

async function j(u){ var r=await fetch(u); var t=await r.text(); var d; try{d=JSON.parse(t)}catch(e){d=null} return {s:r.status,d:d}; }

async function load(){
  var id=($('idIn').value||'').trim(); if(!id){ return; }
  history.replaceState(null,'',location.pathname+'?drawId='+encodeURIComponent(id));
  $('page').innerHTML='<p class="note">Loading '+esc(id)+'…</p>';
  var rec=await j(BACKEND+'/draws/'+encodeURIComponent(id));
  var opensR=await j(BACKEND+'/opens?limit=200');
  var terms=(opensR.d&&opensR.d.items||[]).filter(function(x){return x.drawId===id;})[0]||{};
  if(rec.s!==200||!rec.d){ // offer-only (not revealed yet) or unknown
    if(terms.drawId){ renderOfferOnly(id,terms); return; }
    $('page').innerHTML='<p class="note" style="color:#b3261e">No record found for drawId <b>'+esc(id)+'</b> on '+esc(BACKEND)+'.</p>'; return;
  }
  render(rec.d, terms);
}

function orgBlock(){
  return '<div class="org">'+
    '<div class="row"><label>Organiser</label><input placeholder="Your legal entity / brand"></div>'+
    '<div class="row"><label>Registration no.</label><input placeholder="company / tax id"></div>'+
    '<div class="row"><label>Contact</label><input placeholder="email / address"></div>'+
  '</div>';
}
function closingTerms(terms){
  if(terms.closeBy) return 'Closes by '+isoMs(terms.closeByISO);
  if(terms.openEnded) return 'Open-ended'+(terms.closeCondition? ' — closes when: '+esc(terms.closeCondition) : ' (no stated condition)');
  return '—';
}
function verifyBlock(d){
  var ru=BACKEND+'/draws/'+encodeURIComponent(d.drawId);
  return '<h2>How anyone can verify this independently</h2>'+
  '<p class="note">This result is not asserted — it is recomputable from the public inputs above. The winner is fixed by the public <b>drand</b> randomness beacon for a round whose value did not exist when the prizes and server seed were timestamped, so it could not be steered.</p>'+
  '<pre>combinedSeed = SHA-256( serverSeed : drandRandomness )\nscore(id)    = SHA-256( combinedSeed : id )     // for every entrant\nsort by score descending (ties: id ascending), then award the prize pool top-down</pre>'+
  '<div class="kv"><b>Published record</b><span class="mono"><a href="'+ru+'" target="_blank" rel="noopener">'+esc(ru)+'</a></span></div>'+
  '<div class="kv"><b>Reference verifiers</b><span class="note">JS / Python / Java / C++ reproduce this byte-for-byte: <a href="https://github.com/constarik/uvs" target="_blank" rel="noopener">github.com/constarik/uvs</a></span></div>'+
  '<div class="kv"><b>drand round</b><span class="note"><a href="'+esc(d.drand&&d.drand.verifyUrl||'')+'" target="_blank" rel="noopener">verify the randomness at api.drand.sh</a></span></div>'+
  '<div class="kv"><b>Timestamp tokens</b><span class="note">each RFC-3161 token verifies with <span class="mono">openssl ts -verify -digest &lt;commitmentHash&gt; -in token.tsr -CAfile &lt;tsa-ca&gt;</span></span></div>';
}

function renderOfferOnly(id, terms){
  var h='<h1>Public Offer — Prize Draw</h1>'+
  '<p class="sub">Terms attested before sales. The draw has not yet been closed/revealed. Issued by the organiser named below; draw facts are timestamped by UVS, an independent verification layer.</p>'+
  '<h2>Organiser</h2>'+orgBlock()+
  '<h2>The offer (fixed before tickets are sold)</h2>'+
  '<div class="kv"><b>Draw</b><span>'+esc(terms.label||'—')+'</span></div>'+
  '<div class="kv"><b>Draw ID</b><span class="mono">'+esc(id)+'</span></div>'+
  '<div class="kv"><b>Prizes</b><span>'+prizeText(terms.prizePool)+'</span></div>'+
  '<div class="kv"><b>Closing terms</b><span>'+closingTerms(terms)+'</span></div>'+
  '<div class="kv"><b>Rules hash</b><span class="mono">'+esc(terms.rulesHash||'—')+'</span></div>'+
  '<div class="kv"><b>Terms timestamped</b><span class="note">opened '+isoMs(terms.openedISO)+' (RFC-3161, ×2 TSA). Public ledger: <a href="'+SITE+'/opens" target="_blank" rel="noopener">'+SITE+'/opens</a></span></div>'+
  '<p class="note">A ticket purchase is acceptance of these published terms. The result document is generated automatically once the draw is closed and revealed.</p>'+
  foot();
  $('page').innerHTML=h;
}

function render(d, terms){
  var winners=(d.result||[]).filter(function(r){return r.prize;});
  var winRows=winners.map(function(r){ return '<tr class="win"><td>'+r.rank+'</td><td class="mono">'+esc(r.id)+'</td><td>'+esc(r.prize)+'</td></tr>'; }).join('');
  var allRows=(d.result||[]).map(function(r){ return '<tr><td>'+r.rank+'</td><td class="mono">'+esc(r.id)+'</td><td>'+esc(r.prize||'')+'</td><td class="mono">'+esc(String(r.score||'').slice(0,16))+'…</td></tr>'; }).join('');
  var dr=d.drand||{};
  var h='<h1>Public Offer &amp; Verifiable Draw Result <span class="badge">🟢 '+esc(d.tier||'')+'</span></h1>'+
  '<p class="sub">Issued by the organiser named below. The draw facts are produced and timestamped by UVS (uncloned.work), an independent verification layer — UVS is not the organiser and holds no funds. Anyone can recompute the result from the published inputs.</p>'+
  '<h2>Organiser</h2>'+orgBlock()+
  '<h2>1 · The offer (terms fixed before sales)</h2>'+
  '<div class="kv"><b>Draw</b><span>'+esc(d.label||'—')+'</span></div>'+
  '<div class="kv"><b>Draw ID</b><span class="mono">'+esc(d.drawId)+'</span></div>'+
  '<div class="kv"><b>Prizes</b><span>'+prizeText(d.rules&&d.rules.prizePool)+'</span></div>'+
  '<div class="kv"><b>Closing terms</b><span>'+closingTerms(terms)+'</span></div>'+
  '<div class="kv"><b>Rules hash</b><span class="mono">'+esc((d.rulesAttestation&&d.rulesAttestation.rulesHash)||'—')+'</span></div>'+
  '<div class="kv"><b>Terms timestamped</b><span class="note">'+tsaLine(d.rulesAttestation&&d.rulesAttestation.anchor)+' — proves the prizes existed before any ticket was sold</span></div>'+
  '<h2>2 · The result</h2>'+
  '<div class="kv"><b>Entrants</b><span>'+(Array.isArray(d.participants)?d.participants.length:'—')+(d.declaredCount!=null?' (organiser-declared sold: '+d.declaredCount+', matched)':'')+'</span></div>'+
  '<table><thead><tr><th>Rank</th><th>Winning entry</th><th>Prize</th></tr></thead><tbody>'+(winRows||'<tr><td colspan="3" class="note">no prize tier resolved</td></tr>')+'</tbody></table>'+
  '<details><summary>Full ranked order ('+(d.result||[]).length+')</summary><table><thead><tr><th>Rank</th><th>Entry</th><th>Prize</th><th>Score</th></tr></thead><tbody>'+allRows+'</tbody></table></details>'+
  '<h2>3 · Cryptographic record</h2>'+
  '<div class="kv"><b>Public randomness</b><span class="note">'+esc(dr.beacon||'drand')+' round '+esc(dr.round)+' · published '+iso(dr.roundTime)+'</span></div>'+
  '<div class="kv"><b>randomness</b><span class="mono">'+esc(dr.randomness||'')+'</span></div>'+
  '<div class="kv"><b>server seed</b><span class="mono">'+esc(d.serverSeed||'')+'</span></div>'+
  '<div class="kv"><b>commitment</b><span class="mono">'+esc(d.commitment||'')+'</span></div>'+
  '<div class="kv"><b>commitment hash</b><span class="mono">'+esc(d.commitmentHash||'')+'</span></div>'+
  '<div class="kv"><b>commitment stamped</b><span class="note">'+tsaLine(d.commitmentAnchor)+' — before the drand round above existed</span></div>'+
  verifyBlock(d)+
  foot();
  $('page').innerHTML=h;
}
function foot(){
  return '<div class="foot">This document is issued by the organiser named above as a public offer (договір приєднання / contract de adeziune / public offer). UVS supplies the timestamped, independently-recomputable draw facts; it is a verification layer, not the organiser, and does not take entries, hold the prize pool, or run the sale. Generated '+iso(Math.floor(Date.now()/1000))+' from '+esc(BACKEND)+'.</div>';
}
(function(){ var id=P.get('drawId'); if(id){ $('idIn').value=id; load(); } })();
</script></body></html>
